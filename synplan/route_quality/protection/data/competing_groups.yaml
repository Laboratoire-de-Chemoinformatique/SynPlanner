  template_smarts: '[#6;!R;$([#6;D3;$([#6](=O)([#6;A;!$(*=*)])[#6;A;!$(*=*)])]);!$([#6](=O)[C;D2][F,Cl,Br,I,$(OS(=O)(=O)C(F)(F)F)]):1]([A:3])[A:2]'
