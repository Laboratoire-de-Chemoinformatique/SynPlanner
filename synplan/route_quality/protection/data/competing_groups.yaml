# Reactive functional group SMARTS patterns for protection-group analysis.
#
# Converted from Westerlund et al., ChemRxiv, 2025.
# https://doi.org/10.26434/chemrxiv-2025-gdrr8
#
# Organised by reactivity category. Each entry has:
#   name              - unique label, also used as row/column key in the incompatibility matrix
#   smarts            - SMARTS string for functional group detection
#   template_smarts   - SMARTS with atom mapping for protection template application
#   modification_type - 'label' (mark only) or 'clip' (remove leaving group)
#   example           - example molecule SMILES
#
# Total: 102 patterns in 18 categories.

AminoAcid:
- name: NonProlineAlphaAminoAcid_unprotected
  smarts: '[N;D1;$(N[C;X4]C(=O)[O;D1])]'
  template_smarts: '[N;D1;$(N[C;X4]C(=O)[O;D1]):1][#6:2]'
  modification_type: label
  example: NCXC(=O)O
- name: NonProlineAlphaAminoAcid_protected
  smarts: '[N;D2;$(N([C;X4]C(=O)[O;D1])C(=O)O[#6])]'
  template_smarts: '[N;D2;$(N([C;X4]C(=O)[O;D1])C(=O)O[#6]):1][#6:2]'
  modification_type: label
  example: N(C(=O)OC(C)(C)C)CXC(=O)O
- name: NonProlineAlphaAminoEster
  smarts: '[N;D1;$(N([C;X4]C(=O)[O;D2][#6]))]'
  template_smarts: '[N;D1;$(N([C;X4]C(=O)[O;D2][#6])):1][#6:2]'
  modification_type: label
  example: NCXC(=O)OC
Acid:
- name: Acid_SaturatedAliphatic
  smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([!$(**[C]=[C]);!$(**[C]#[C]);!$(**[C]#[N]);!$(**a)])]'
  template_smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([!$(**[C]=[C]);!$(**[C]#[C]);!$(**[C]#[N]);!$(**a)]):1][*:2]'
  modification_type: clip
  example: CXCC(=O)O
- name: Acid_UnsaturatedAliphatic
  smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[C]=[C]),$(**[C]#[C]),$(**[C]#[N]);!$(**a)])]'
  template_smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[C]=[C]),$(**[C]#[C]),$(**[C]#[N]);!$(**a)]):1][*:2]'
  modification_type: clip
  example: CXC=CC(=O)O
- name: Acid_Aromatic
  smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[c;$(c1ccccc1)]),$(**[c;$(c1cccc1)])])]'
  template_smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[c;$(c1ccccc1)]),$(**[c;$(c1cccc1)])]):1][*:2]'
  modification_type: clip
  example: c1Xccccc1C(=O)O
- name: Acid_Heteroaromatic
  smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[a;$(a1aaaaa1)]),$(**[a;$(a1aaaa1)]);!$(**[c;$(c1ccccc1)]);!$(**[c;$(c1cccc1)])])]'
  template_smarts: '[O;D1;$(O[C;D2,D3;$(C(=O));!$(C(O)(=O)[!#6])]);$([$(**[a;$(a1aaaaa1)]),$(**[a;$(a1aaaa1)]);!$(**[c;$(c1ccccc1)]);!$(**[c;$(c1cccc1)])]):1][*:2]'
  modification_type: clip
  example: c1Xcnccc1C(=O)O
XKetone:
- name: XKetoneAromaticFluoride
  smarts: '[C;$(C([#6;a])(=O)C[F])]'
  template_smarts: '[C;$(C([#6;a])(=O)C[F]):1][*;!$(C[F]):2]'
  modification_type: clip
  example: c1Xccccc1C(=O)CF
- name: XKetoneAromaticChloride
  smarts: '[C;$(C([#6;a])(=O)C[Cl])]'
  template_smarts: '[C;$(C([#6;a])(=O)C[Cl]):1][*;!$(C[Cl]):2]'
  modification_type: clip
  example: c1Xccccc1C(=O)CCl
- name: XKetoneAromaticBromide
