  modification_type: clip
  example: CXCC(=O)CBr
- name: XKetoneAliphaticIodide
  smarts: '[C;$(C([#6;!a])(=O)C[I])]'
  template_smarts: '[C;$(C([#6;!a])(=O)C[I]):1][*;!$(C[I]):2]'
  modification_type: clip
  example: CXCC(=O)CI
- name: XKetoneAliphaticTriflate
  smarts: '[C;$(C([#6;!a])(=O)C[*;$(OS(=O)(=O)C(F)(F)F)])]'
  template_smarts: '[C;$(C([#6;!a])(=O)C[*;$(OS(=O)(=O)C(F)(F)F)]):1][*;!$(COS(=O)(=O)C(F)(F)F):2]'
  modification_type: clip
  example: CXCC(=O)COS(=O)(=O)C(F)(F)F
Aldehyde:
- name: Aldehyde_SaturatedAliphatic
  smarts: '[C;$([C;D1,D2;H1,H2]=O);!$(C(=O)[!#6]);$([!$(*[C]=[C]);!$(*[C]#[C]);!$(*[C]#[N]);!$(*a)])]'
  template_smarts: '[C;$([C;D1,D2;H1,H2]=O);!$(C(=O)[!#6]);$([!$(*[C]=[C]);!$(*[C]#[C]);!$(*[C]#[N]);!$(*a)]):1][A:2]'
