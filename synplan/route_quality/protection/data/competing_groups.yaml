  example: c1Xccccc1C(=O)CI
- name: XKetoneAromaticTriflate
  smarts: '[C;$(C([#6;a])(=O)C[*;$(OS(=O)(=O)C(F)(F)F)])]'
  template_smarts: '[C;$(C([#6;a])(=O)C[$(OS(=O)(=O)C(F)(F)F)]):1][*;!$(COS(=O)(=O)C(F)(F)F):2]'
  modification_type: clip
  example: c1Xccccc1C(=O)COS(=O)(=O)C(F)(F)F
- name: XKetoneAliphaticFluoride
  smarts: '[C;$(C([#6;!a])(=O)C[F])]'
  template_smarts: '[C;$(C([#6;!a])(=O)C[F]):1][*;!$(C[F]):2]'
  modification_type: clip
  example: CXCC(=O)CF
- name: XKetoneAliphaticChloride
  smarts: '[C;$(C([#6;!a])(=O)C[Cl])]'
