# Halogen SMARTS patterns for competing halogen site detection.
#
# Converted from Westerlund et al., ChemRxiv, 2025.
# https://doi.org/10.26434/chemrxiv-2025-gdrr8
#
# Grouped by halogen family for same-family competing detection.
#   smarts            - SMARTS string for halogen detection
#   family            - halogen family (fluoride/chloride/bromide/iodide/triflate)
#   template_smarts   - SMARTS with atom mapping
#   modification_type - 'clip' (remove leaving group)
#   example           - example molecule SMILES
#
# Total: 140 patterns.

AcidX-Fluoride_SaturatedAliphatic:
  smarts: '[F;$([F][C;$(C(=O));!$(C([#7,#8,#15,#16])(=[O;D1])[#9,#17,#35,#53])]);$([!$(**[C]=[C]);!$(**[C]#[C]);!$(**[C]#[N]);!$(**a)])]'
  family: fluoride
  template_smarts: '[F;$([F][C;$(C(=O));!$(C([#7,#8,#15,#16])(=[O;D1])[#9,#17,#35,#53])]);$([!$(**[C]=[C]);!$(**[C]#[C]);!$(**[C]#[N]);!$(**a)]):1][*:2]'
  modification_type: clip
  example: CXCC(=O)F
