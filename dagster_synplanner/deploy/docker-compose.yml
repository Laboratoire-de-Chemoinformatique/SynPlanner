# Docker Compose for local SynPlanner Dagster development
#
# Usage:
#   docker compose -f dagster_synplanner/deploy/docker-compose.yml up --build
#
# Services:
#   - postgres: Dagster metadata storage
#   - dagster-webserver: Dagster UI at http://localhost:3000
#   - user-code: Dagster gRPC server hosting SynPlanner jobs
#   - dagster-daemon: Runs sensors, schedules, and run queuing
#   - api: FastAPI backend at http://localhost:8000
#   - frontend: React dev server at http://localhost:5173

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      retries: 5

  dagster-webserver:
    build:
      context: ../..
      dockerfile: dagster_synplanner/Dockerfile
      target: dagster-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment: &dagster-env
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_USER: dagster
      DAGSTER_PG_PASSWORD: dagster
      DAGSTER_PG_DB: dagster
      SYNPLANNER_OUTPUT_DIR: /data/synplanner
      SYNPLANNER_DEVICE: cpu
    ports:
      - "3000:3000"
    volumes:
      - synplanner-data:/data/synplanner

  user-code:
    build:
      context: ../..
      dockerfile: dagster_synplanner/Dockerfile
      target: dagster-user-code
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *dagster-env
    volumes:
      - synplanner-data:/data/synplanner

  dagster-daemon:
    build:
      context: ../..
      dockerfile: dagster_synplanner/Dockerfile
      target: dagster-webserver
    command: ["dagster-daemon", "run"]
    depends_on:
      postgres:
        condition: service_healthy
      user-code:
        condition: service_started
    environment:
      <<: *dagster-env
    volumes:
      - synplanner-data:/data/synplanner

  api:
    build:
      context: ../..
      dockerfile: dagster_synplanner/Dockerfile
      target: api-server
    depends_on:
      - dagster-webserver
    environment:
      DAGSTER_GRAPHQL_URL: http://dagster-webserver:3000/graphql
      SYNPLANNER_OUTPUT_DIR: /data/synplanner
      SYNPLANNER_UPLOAD_DIR: /data/synplanner/uploads
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - synplanner-data:/data/synplanner

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../../dagster_synplanner/frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  synplanner-data:
